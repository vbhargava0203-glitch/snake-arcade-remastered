<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SNAKE — Ultimate</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030508;--panel:#080d18;--border:rgba(0,255,136,0.12);
  --green:#00ff88;--green2:#00cc6a;--red:#ff3366;
  --gold:#ffd700;--text:#e8f4f0;--muted:#4a6670;
}
body{
  background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:16px;overflow:hidden;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
  animation:gp 4s ease-in-out infinite;
}
@keyframes gp{0%,100%{opacity:.5}50%{opacity:1}}
.wrap{position:relative;z-index:1;width:100%;max-width:500px;}
.hdr{text-align:center;margin-bottom:20px}
.hdr-tag{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.3em;color:var(--green);opacity:.7;margin-bottom:8px}
h1{
  font-family:'Orbitron',monospace;font-size:clamp(30px,7vw,52px);font-weight:900;
  letter-spacing:.15em;color:#fff;
  text-shadow:0 0 30px var(--green),0 0 60px rgba(0,255,136,.3);
  animation:tp 3s ease-in-out infinite;
}
@keyframes tp{0%,100%{text-shadow:0 0 30px var(--green),0 0 60px rgba(0,255,136,.3)}50%{text-shadow:0 0 55px var(--green),0 0 110px rgba(0,255,136,.5)}}
.stats{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:12px 20px;margin-bottom:12px;
}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.slbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-family:'Orbitron',monospace}
.sval{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:#fff;min-width:40px;text-align:center}
.sval.flash{animation:fg .4s ease}
@keyframes fg{0%,100%{color:#fff}50%{color:var(--gold);text-shadow:0 0 12px var(--gold)}}
.lvlb{
  background:linear-gradient(135deg,rgba(155,89,182,.2),rgba(155,89,182,.05));
  border:1px solid rgba(155,89,182,.4);border-radius:20px;padding:6px 16px;
  font-family:'Orbitron',monospace;font-size:11px;color:#c39bd3;text-align:center;
}
.lvlb span{display:block;font-size:8px;color:rgba(155,89,182,.6);letter-spacing:.1em;margin-bottom:1px}
.cwrap{
  position:relative;border-radius:14px;overflow:hidden;
  border:1px solid var(--border);
  box-shadow:0 0 50px rgba(0,255,136,.08),0 0 80px rgba(0,0,0,.8);
}
.cwrap.shake{animation:sk .35s ease}
@keyframes sk{
  0%,100%{transform:translate(0,0)}15%{transform:translate(-6px,4px)}
  30%{transform:translate(5px,-3px)}45%{transform:translate(-4px,5px)}
  60%{transform:translate(4px,-2px)}75%{transform:translate(-2px,3px)}
}
canvas{display:block;width:100%;background:#040910}
.ctrls{display:flex;gap:10px;justify-content:center;margin-top:12px}
.btn{
  font-family:'Orbitron',monospace;font-weight:700;font-size:12px;
  letter-spacing:.08em;padding:12px 28px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;
}
.bs{background:linear-gradient(135deg,var(--green),var(--green2));color:#000;box-shadow:0 0 20px rgba(0,255,136,.3)}
.bs:hover{transform:translateY(-2px);box-shadow:0 0 35px rgba(0,255,136,.5)}
.br{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.08)}
.br:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.apad{
  display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(2,46px);
  gap:6px;margin-top:12px;justify-content:center;
}
.apad button{
  width:46px;height:46px;padding:0;background:var(--panel);
  border:1px solid rgba(0,255,136,.1);color:var(--muted);font-size:18px;
  border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .1s;font-family:inherit;
}
.apad button:hover,.apad button:active{
  background:rgba(0,255,136,.1);border-color:var(--green);
  color:var(--green);box-shadow:0 0 12px rgba(0,255,136,.2);
}
.u{grid-column:2;grid-row:1}.l{grid-column:1;grid-row:2}
.d{grid-column:2;grid-row:2}.r{grid-column:3;grid-row:2}
.tip{text-align:center;font-size:11px;color:var(--muted);margin-top:10px}
.tip b{color:rgba(0,255,136,.5)}
#combo{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron',monospace;font-size:clamp(22px,5vw,38px);font-weight:900;
  color:var(--gold);text-shadow:0 0 30px var(--gold);
  pointer-events:none;opacity:0;z-index:99;white-space:nowrap;
}
#combo.pop{animation:cp .9s ease forwards}
@keyframes cp{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
  20%{opacity:1;transform:translate(-50%,-58%) scale(1.15)}
  70%{opacity:1;transform:translate(-50%,-62%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-78%) scale(.85)}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-tag">▸ CLASSIC ARCADE REIMAGINED</div>
    <h1>SNAKE</h1>
  </div>
  <div class="stats">
    <div class="stat"><span class="slbl">Score</span><span class="sval" id="SE">0</span></div>
    <div class="lvlb"><span>LEVEL</span><span id="LE">1</span></div>
    <div class="stat"><span class="slbl">Best</span><span class="sval" id="BE">0</span></div>
  </div>
  <div class="cwrap" id="CW">
    <canvas id="c" width="460" height="460"></canvas>
  </div>
  <div class="ctrls">
    <button class="btn bs" id="SB" onclick="startGame()">START GAME</button>
    <button class="btn br" onclick="resetGame()">RESET</button>
  </div>
  <div class="apad">
    <button class="u" onclick="setDir(0,-1)">↑</button>
    <button class="l" onclick="setDir(-1,0)">←</button>
    <button class="d" onclick="setDir(0,1)">↓</button>
    <button class="r" onclick="setDir(1,0)">→</button>
  </div>
  <p class="tip">Arrow keys or tap pad &nbsp;·&nbsp; <b>Speed increases every level</b></p>
</div>
<div id="combo"></div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const COLS = 20, ROWS = 20, CELL = W / COLS; // CELL = 23

// safe arc — never throws on negative radius
function arc(x, y, r, a0, a1) {
  if (r <= 0) return;
  ctx.arc(x, y, r, a0, a1);
}

let snake=[], prevSnake=[], dir={x:1,y:0}, nextDir={x:1,y:0};
let food={x:15,y:10};
let score=0, best=0, level=1, combo=0;
let running=false, rafId=null;
let particles=[];
let foodAngle=0, deathFlash=0;
let tickInterval=180, lastTick=0;

// ── init ──────────────────────────────────────────────────
function initGame() {
  snake      = [{x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10}];
  prevSnake  = snake.map(s=>({...s}));
  dir        = {x:1,y:0};
  nextDir    = {x:1,y:0};
  score=0; level=1; combo=0;
  tickInterval=180; deathFlash=0;
  particles=[];
  spawnFood();
  updateUI();
}

function spawnFood() {
  let f;
  do { f={x:~~(Math.random()*COLS), y:~~(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===f.x&&s.y===f.y));
  food = f;
}

// ── controls ──────────────────────────────────────────────
function startGame() {
  if (running) return;
  initGame();
  running  = true;
  lastTick = performance.now();
  document.getElementById('SB').textContent = 'PLAYING...';
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

function resetGame() {
  cancelAnimationFrame(rafId);
  running = false;
  document.getElementById('SB').textContent = 'START GAME';
  initGame();
  drawFrame(1);
}

function setDir(x, y) {
  if (x===1  && dir.x===-1) return;
  if (x===-1 && dir.x===1)  return;
  if (y===1  && dir.y===-1) return;
  if (y===-1 && dir.y===1)  return;
  nextDir = {x, y};
  if (!running) startGame();
}

// ── loop ──────────────────────────────────────────────────
function loop(now) {
  rafId = requestAnimationFrame(loop);
  const dt = now - lastTick;
  const t  = Math.min(dt / tickInterval, 1);
  if (dt >= tickInterval) {
    lastTick = now;
    doTick();
  }
  drawFrame(t);
}

function doTick() {
  dir = {...nextDir};
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};

  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS
    ||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    doGameOver(); return;
  }

  prevSnake = snake.map(s=>({...s}));
  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    score++; combo++;
    if (score>best) best=score;
    level = Math.floor(score/5)+1;
    tickInterval = Math.max(65, 180-(level-1)*18);
    burst(food.x, food.y, 28);
    showCombo(combo);
    spawnFood();
  } else {
    snake.pop();
    combo = 0;
  }
  updateUI();
}

// ── draw ──────────────────────────────────────────────────
function drawFrame(t) {
  // background
  ctx.fillStyle = '#04080f';
  ctx.fillRect(0,0,W,H);

  // grid
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 1;
  for (let i=0;i<=COLS;i++) { ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,H);ctx.stroke(); }
  for (let j=0;j<=ROWS;j++) { ctx.beginPath();ctx.moveTo(0,j*CELL);ctx.lineTo(W,j*CELL);ctx.stroke(); }

  // death flash
  if (deathFlash > 0) {
    ctx.fillStyle = `rgba(255,30,60,${deathFlash*0.4})`;
    ctx.fillRect(0,0,W,H);
    deathFlash = Math.max(0, deathFlash-0.04);
  }

  foodAngle += 0.055;
  drawFood();
  drawSnake(t);
  tickParticles();
  if (!running) drawOverlay();
}

// ── food ──────────────────────────────────────────────────
function drawFood() {
  const cx = food.x*CELL + CELL/2;
  const cy = food.y*CELL + CELL/2;
  const pulse = Math.sin(foodAngle)*0.3 + 0.7;
  const r = Math.max(1, (CELL/2 - 3) * pulse); // always positive

  // outer glow
  for (let i=3;i>=1;i--) {
    ctx.beginPath();
    arc(cx, cy, r + i*4, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,51,102,${0.055/i*pulse})`;
    ctx.fill();
  }

  // fill
  const g = ctx.createRadialGradient(cx-r*0.25, cy-r*0.3, 0, cx, cy, r);
  g.addColorStop(0, '#ff9abb');
  g.addColorStop(0.5, '#ff3366');
  g.addColorStop(1, '#cc0044');
  ctx.beginPath(); arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();

  // shine
  const sr = Math.max(0.5, r*0.22);
  ctx.beginPath(); arc(cx-r*0.28, cy-r*0.32, sr, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
}

// ── snake ─────────────────────────────────────────────────
function drawSnake(t) {
  if (!snake.length) return;
  const n = snake.length;

  for (let i = n-1; i >= 0; i--) {
    const cur = snake[i];
    const prv = prevSnake[i] || cur;

    // lerp position
    const sx = (prv.x + (cur.x - prv.x)*t) * CELL + CELL/2;
    const sy = (prv.y + (cur.y - prv.y)*t) * CELL + CELL/2;

    const frac  = i / n;
    // radius shrinks from head to tail — clamp to >=1
    const r = Math.max(1, CELL/2 - (1.5 + frac * 2.5));
    const alpha = Math.max(0.2, 1 - frac*0.72);

    // glow halo
    if (i < 10) {
      const ga = (1 - i/10) * 0.2;
      const gr = Math.max(1, r + 7);
      ctx.beginPath(); arc(sx, sy, gr, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,255,136,${ga})`; ctx.fill();
    }

    // body gradient
    const sg = ctx.createRadialGradient(sx-r*0.25, sy-r*0.3, 0, sx, sy, r);
    if (i === 0) {
      sg.addColorStop(0, '#b0fff0');
      sg.addColorStop(0.45, '#00ffaa');
      sg.addColorStop(1, '#00bb66');
    } else {
      const h = 145 + frac*35;
      sg.addColorStop(0, `hsla(${h},100%,78%,${alpha})`);
      sg.addColorStop(1, `hsla(${h},100%,36%,${alpha})`);
    }
    ctx.beginPath(); arc(sx, sy, r, 0, Math.PI*2);
    ctx.fillStyle = sg; ctx.fill();

    // rim
    ctx.beginPath(); arc(sx, sy, r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(0,255,136,${alpha*0.35})`;
    ctx.lineWidth = 1; ctx.stroke();

    // shine
    if (r > 4) {
      const shR = Math.max(0.5, r*0.2);
      ctx.beginPath(); arc(sx-r*0.26, sy-r*0.3, shR, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${0.38*alpha})`; ctx.fill();
    }

    if (i === 0) drawHead(sx, sy, r);
  }
}

function drawHead(hx, hy, r) {
  const dx = dir.x, dy = dir.y;
  const eo = Math.max(1, r*0.34);
  const er = Math.max(1, r*0.19);

  let e1x,e1y,e2x,e2y;
  if      (dx===1)  { e1x=hx+eo;e1y=hy-eo; e2x=hx+eo;e2y=hy+eo; }
  else if (dx===-1) { e1x=hx-eo;e1y=hy-eo; e2x=hx-eo;e2y=hy+eo; }
  else if (dy===1)  { e1x=hx-eo;e1y=hy+eo; e2x=hx+eo;e2y=hy+eo; }
  else              { e1x=hx-eo;e1y=hy-eo; e2x=hx+eo;e2y=hy-eo; }

  [[e1x,e1y],[e2x,e2y]].forEach(([ex,ey]) => {
    ctx.beginPath(); arc(ex, ey, er, 0, Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();

    const pr = Math.max(0.5, er*0.52);
    ctx.beginPath(); arc(ex+dx*er*0.3, ey+dy*er*0.3, pr, 0, Math.PI*2);
    ctx.fillStyle='#001f10'; ctx.fill();

    const gr = Math.max(0.3, er*0.18);
    ctx.beginPath(); arc(ex-er*0.18, ey-er*0.18, gr, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.88)'; ctx.fill();
  });

  // tongue
  const flick = Math.sin(foodAngle*3);
  const tx = hx + dx*(r+3), ty = hy + dy*(r+3);
  const fLen = 4 + flick*2.5;
  ctx.strokeStyle='#ff3366'; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(hx+dx*r*0.75, hy+dy*r*0.75);
  ctx.lineTo(tx, ty); ctx.stroke();
  const px=-dy*3, py=dx*3;
  ctx.beginPath();
  ctx.moveTo(tx,ty); ctx.lineTo(tx+dx*fLen+px, ty+dy*fLen+py);
  ctx.moveTo(tx,ty); ctx.lineTo(tx+dx*fLen-px, ty+dy*fLen-py);
  ctx.stroke();
}

// ── particles ─────────────────────────────────────────────
function burst(gx, gy, count) {
  const cx=gx*CELL+CELL/2, cy=gy*CELL+CELL/2;
  const cols=['#ff3366','#ff6688','#ffaacc','#ffffff','#ffdd44','#ff8800'];
  for (let i=0;i<count;i++) {
    const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*5.5;
    particles.push({
      x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      life:1, decay:0.022+Math.random()*0.03,
      r:2+Math.random()*4,
      color:cols[~~(Math.random()*cols.length)],
      grav:0.09+Math.random()*0.09,
      star:Math.random()>0.55
    });
  }
}

function tickParticles() {
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav;
    p.vx*=0.97; p.vy*=0.97; p.life-=p.decay;
    const pr = Math.max(0, p.r * p.life);
    if (pr <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    if (p.star) { starShape(pr); }
    else { ctx.beginPath(); arc(0,0,pr,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });
}

function starShape(r) {
  if (r<=0) return;
  ctx.beginPath();
  for (let i=0;i<10;i++) {
    const a=(i*Math.PI/5)-Math.PI/2;
    const rv = i%2===0 ? r : r*0.42;
    i===0 ? ctx.moveTo(Math.cos(a)*rv, Math.sin(a)*rv)
           : ctx.lineTo(Math.cos(a)*rv, Math.sin(a)*rv);
  }
  ctx.closePath(); ctx.fill();
}

// ── game over ─────────────────────────────────────────────
function doGameOver() {
  running    = false;
  deathFlash = 1;
  document.getElementById('SB').textContent = 'PLAY AGAIN';
  const cw = document.getElementById('CW');
  cw.classList.remove('shake'); void cw.offsetWidth; cw.classList.add('shake');
  setTimeout(()=>cw.classList.remove('shake'), 400);
  snake.forEach(s => burst(s.x, s.y, 3));
}

function drawOverlay() {
  const cx=W/2, cy=H/2;
  ctx.fillStyle='rgba(3,5,8,0.88)';
  rrect(cx-145,cy-85,290,170,16); ctx.fill();
  ctx.strokeStyle='rgba(255,51,102,0.45)'; ctx.lineWidth=1;
  rrect(cx-145,cy-85,290,170,16); ctx.stroke();

  ctx.textAlign='center';
  ctx.font='bold 28px Orbitron,monospace';
  ctx.shadowColor='#ff3366'; ctx.shadowBlur=24;
  ctx.fillStyle='#ff3366';
  ctx.fillText('GAME OVER', cx, cy-30);
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.font='14px Inter,sans-serif';
  ctx.fillText(`Score: ${score}     Best: ${best}`, cx, cy+8);

  ctx.fillStyle='rgba(0,255,136,0.55)';
  ctx.font='10px Orbitron,monospace';
  ctx.fillText('PRESS  PLAY AGAIN  TO RESTART', cx, cy+46);
  ctx.textAlign='left';
}

function rrect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── combo ─────────────────────────────────────────────────
function showCombo(c) {
  if (c<2) return;
  const msgs=['','','DOUBLE!','TRIPLE!','QUAD!!','ON FIRE!','UNSTOPPABLE!','GODLIKE!!'];
  const el = document.getElementById('combo');
  el.textContent = c<msgs.length ? msgs[c] : `×${c} COMBO!`;
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

// ── ui ────────────────────────────────────────────────────
function updateUI() {
  const se = document.getElementById('SE');
  if (se.textContent !== String(score)) {
    se.textContent = score;
    se.classList.remove('flash'); void se.offsetWidth; se.classList.add('flash');
  }
  document.getElementById('BE').textContent = best;
  document.getElementById('LE').textContent = level;
}

// ── keyboard ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const m = {ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if (m[e.key]) { e.preventDefault(); setDir(...m[e.key]); }
});

// ── touch swipe ───────────────────────────────────────────
let tx0=0, ty0=0;
canvas.addEventListener('touchstart', e=>{ tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; },{passive:true});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if (Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0);
  else setDir(0,dy>0?1:-1);
},{passive:true});

// ── boot ──────────────────────────────────────────────────
initGame();
drawFrame(1);
</script>
</body>
</html>
